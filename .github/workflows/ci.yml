name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go mod download
        run: go mod download

      - name: go build
        run: go build -trimpath -ldflags="-s -w" -o ipadecrypt ./cmd/ipadecrypt

  helper:
    name: helper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute toolchain tag + push eligibility
        id: meta
        run: |
          hash=$(sha256sum helper/Dockerfile | cut -c1-12)
          owner="${{ github.repository_owner }}"
          echo "image=ghcr.io/${owner}/ipadecrypt-toolchain:df-${hash}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${owner}/ipadecrypt-toolchain:latest"    >> "$GITHUB_OUTPUT"

          # Push only when we can - fork PRs get read-only GITHUB_TOKEN and 403 on push.
          if [ "${{ github.event_name }}" != "pull_request" ] \
             || [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "can_push=true"  >> "$GITHUB_OUTPUT"
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: check if toolchain image already published
        id: probe
        run: |
          if docker manifest inspect "${{ steps.meta.outputs.image }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "toolchain image already at ${{ steps.meta.outputs.image }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Case A: image is in GHCR. Pull it. Fast path for every PR when Dockerfile didn't change.
      - name: pull toolchain image
        if: steps.probe.outputs.exists == 'true'
        run: docker pull --platform linux/amd64 "${{ steps.meta.outputs.image }}"

      # Case B: image isn't in GHCR, and we can push. Build + push.
      - name: build and push toolchain image
        if: steps.probe.outputs.exists != 'true' && steps.meta.outputs.can_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: helper
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ipadecrypt-toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ipadecrypt-toolchain:buildcache,mode=max,ignore-error=true
          tags: ${{ steps.meta.outputs.image }}

      # Case C: image isn't in GHCR and we can't push (fork PR with changed Dockerfile).
      # Build locally, use it just for this job's drift check. Don't pollute the registry.
      - name: build toolchain image locally (fork PR)
        if: steps.probe.outputs.exists != 'true' && steps.meta.outputs.can_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: helper
          platforms: linux/amd64
          load: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ipadecrypt-toolchain:buildcache
          tags: ${{ steps.meta.outputs.image }}

      # On main, make sure :latest points at the current Dockerfile's image.
      # Manifest-level retag - no rebuild.
      - name: retag :latest on main
        if: github.ref == 'refs/heads/main' && steps.meta.outputs.can_push == 'true'
        run: |
          docker buildx imagetools create \
              --tag "${{ steps.meta.outputs.latest }}" \
              "${{ steps.meta.outputs.image }}"

      - name: build helper
        env:
          IPADECRYPT_TOOLCHAIN_IMAGE: ${{ steps.meta.outputs.image }}
        run: ./helper/build.sh

      - name: upload fresh helper.arm64
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helper.arm64
          path: helper/dist/helper.arm64
          if-no-files-found: ignore

      - name: verify no drift vs committed helper.arm64
        run: |
          fresh=$(sha256sum helper/dist/helper.arm64 | awk '{print $1}')
          committed=$(sha256sum internal/device/helper.arm64 | awk '{print $1}')
          echo "fresh:     $fresh"
          echo "committed: $committed"
          if [ "$fresh" != "$committed" ]; then
            echo "::error::helper.arm64 drift - rebuild via ./helper/build.sh and commit internal/device/helper.arm64"
            exit 1
          fi
